name: ${COMPOSE_PROJECT_NAME:-device-registry-service}

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME:-device_registry}
      POSTGRES_USER: ${DB_USER:-device_registry_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-device_registry_pass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-device_registry_user}"]
      interval: 5s
      timeout: 3s
      retries: 5

  device-registry:
    build:
      context: ..
      dockerfile: docker/django/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
